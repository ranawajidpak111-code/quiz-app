<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.quiz-box{
width:500px;
background:#222;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px cyan;
}

h1{
color:cyan;
margin-bottom:20px;
}

#question{
color:white;
font-size:30px;
margin-bottom:20px;
}

#answers button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
background:cyan;
color:black;
font-weight:bold;
transition:0.3s;
}

#nextBtn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
background:lime;
color:black;
font-weight:bold;
}

</style>
</head>

<body>

<div class="quiz-box">

<h1>Quiz App 🧠</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="nextBtn">
Next Question
</button>

</div>

<script>

const quizData = [

{
question:"What does HTML stand for?",
answers:[
"Hyper Text Markup Language",
"Home Tool Markup Language",
"High Text Machine Language",
"Hyper Tool Machine Language"
],
correct:0
},

{
question:"Which language is used for styling?",
answers:[
"HTML",
"Python",
"CSS",
"Java"
],
correct:2
},

{
question:"Which tag is used for image?",
answers:[
"<img>",
"<image>",
"<pic>",
"<src>"
],
correct:0
},

{
question:"Which language is used for website logic?",
answers:[
"CSS",
"JavaScript",
"HTML",
"C++"
],
correct:1
},

{
question:"Which tag creates a link?",
answers:[
"<a>",
"<link>",
"<href>",
"<url>"
],
correct:0
},

{
question:"Which CSS property changes text color?",
answers:[
"text-color",
"font-color",
"color",
"background"
],
correct:2
},

{
question:"Which symbol is used for id in CSS?",
answers:[
".",
"#",
"*",
"@"
],
correct:1
},

{
question:"Which company created JavaScript?",
answers:[
"Google",
"Microsoft",
"Netscape",
"Apple"
],
correct:2
},

{
question:"Which HTML tag is used for heading?",
answers:[
"<h1>",
"<head>",
"<p>",
"<title>"
],
correct:0
},

{
question:"Which method prints in console?",
answers:[
"print()",
"console.log()",
"log.console()",
"write()"
],
correct:1
}

];

let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;

const question =
document.getElementById("question");

const answers =
document.getElementById("answers");

const nextBtn =
document.getElementById("nextBtn");

function loadQuestion(){

selectedAnswer = null;

question.innerText =
quizData[currentQuestion].question;

answers.innerHTML = "";

quizData[currentQuestion].answers.forEach(
(answer,index)=>{

const button =
document.createElement("button");

button.innerText = answer;

button.onclick = function(){

selectedAnswer = index;

const allButtons =
answers.querySelectorAll("button");

allButtons.forEach(btn=>{
btn.style.background = "cyan";
});

button.style.background = "lime";

};

answers.appendChild(button);

});

}

nextBtn.onclick = function(){

if(selectedAnswer ===
quizData[currentQuestion].correct){

score++;

}

currentQuestion++;

if(currentQuestion < quizData.length){

loadQuestion();

}else{

document.querySelector(".quiz-box").innerHTML =

`
<h1 style="color:cyan;">
Quiz Finished 🎉
</h1>

<h2 style="color:yellow; margin-top:20px;">
Your Score: ${score}/10
</h2>
`;

}

};

loadQuestion();

</script>

</body>
</html>
